<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>대경선 시간표 · 구미↔왜관↔대구</title>
<style>
  :root{
    --bg: #0a1420;
    --panel: #0f1e2c;
    --panel-2: #142735;
    --line: rgba(255,255,255,0.07);
    --line-strong: rgba(255,255,255,0.14);
    --text: #eaf1f5;
    --text-dim: #7f97a6;
    --text-faint: #4d6272;
    --amber: #ffb302;
    --amber-dim: rgba(255,179,2,0.14);
    --cyan: #35d0c4;
    --cyan-dim: rgba(53,208,196,0.14);
    --radius: 14px;
    font-size: 16px;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    min-height: 100vh;
  }

  .mono{
    font-family: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  /* ---- background texture: faint rail-tie lines ---- */
  body{
    background-image:
      repeating-linear-gradient(180deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 34px);
  }

  .wrap{
    max-width: 640px;
    margin: 0 auto;
    padding: 0 0 48px;
    min-height: 100vh;
    position: relative;
  }

  /* ---------------- HEADER ---------------- */
  header{
    position: sticky;
    top: 0;
    z-index: 30;
    background: linear-gradient(180deg, var(--bg) 70%, rgba(10,20,32,0.92));
    backdrop-filter: blur(6px);
    padding: 18px 18px 10px;
    border-bottom: 1px solid var(--line);
  }
  .title-row{
    display:flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 10px;
  }
  h1{
    margin:0;
    font-size: 21px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }
  h1 span{
    display:block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.02em;
    margin-top: 3px;
  }
  .clock{
    text-align:right;
    line-height:1;
    flex-shrink:0;
  }
  .clock .t{
    font-size: 20px;
    font-weight: 700;
    color: var(--amber);
  }
  .clock .d{
    font-size: 10.5px;
    color: var(--text-faint);
    margin-top: 4px;
    font-family: -apple-system, sans-serif;
    letter-spacing: 0.03em;
  }

  /* ---------------- SEGMENTED CONTROLS ---------------- */
  .segment{
    display:flex;
    gap: 6px;
    margin-top: 14px;
    background: var(--panel);
    padding: 4px;
    border-radius: 12px;
    border: 1px solid var(--line);
  }
  .segment button{
    flex:1;
    border:none;
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 700;
    padding: 9px 6px;
    border-radius: 9px;
    cursor:pointer;
    font-family: inherit;
    transition: background .15s, color .15s;
  }
  .segment button.active{
    background: var(--panel-2);
    color: var(--text);
  }
  .segment.daytype button.active{ color: var(--amber); box-shadow: inset 0 0 0 1px rgba(255,179,2,0.35);}

  .dirtabs{
    margin-top: 8px;
    display:flex;
    flex-direction: column;
    gap: 8px;
  }
  .dirtabs button{
    display:flex;
    align-items:center;
    gap: 10px;
    width:100%;
    text-align:left;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text-dim);
    padding: 11px 13px;
    border-radius: 12px;
    font-family: inherit;
    cursor:pointer;
    font-size: 13.5px;
    font-weight: 700;
    transition: border-color .15s, background .15s, color .15s;
  }
  .dirtabs button .dot{
    width: 8px; height:8px; border-radius:50%;
    background: var(--text-faint);
    flex-shrink:0;
  }
  .dirtabs button .route{ flex:1; color: var(--text); }
  .dirtabs button .arrow{ color: var(--text-faint); font-size: 12px;}
  .dirtabs button.active[data-dir="1"]{
    border-color: rgba(255,179,2,0.5);
    background: var(--amber-dim);
  }
  .dirtabs button.active[data-dir="1"] .dot{ background: var(--amber); box-shadow: 0 0 8px rgba(255,179,2,0.6);}
  .dirtabs button.active[data-dir="2"]{
    border-color: rgba(53,208,196,0.5);
    background: var(--cyan-dim);
  }
  .dirtabs button.active[data-dir="2"] .dot{ background: var(--cyan); box-shadow: 0 0 8px rgba(53,208,196,0.6);}

  /* ---------------- NEXT TRAIN BANNER ---------------- */
  .next-banner{
    margin: 14px 18px 0;
    border-radius: var(--radius);
    padding: 13px 15px;
    display:flex;
    align-items:center;
    gap: 10px;
    border: 1px solid var(--line-strong);
    background: var(--panel);
  }
  .next-banner .lbl{
    font-size: 10.5px;
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .next-banner .big{
    font-size: 15px;
    font-weight: 800;
    margin-top: 2px;
  }
  .next-banner .eta{
    margin-left:auto;
    text-align:right;
  }
  .next-banner .eta .n{
    font-size: 22px;
    font-weight: 800;
  }
  .next-banner .eta .u{
    font-size: 10px;
    color: var(--text-dim);
  }
  .next-banner.dir1{ border-color: rgba(255,179,2,0.35); }
  .next-banner.dir1 .big, .next-banner.dir1 .eta .n{ color: var(--amber); }
  .next-banner.dir2{ border-color: rgba(53,208,196,0.35); }
  .next-banner.dir2 .big, .next-banner.dir2 .eta .n{ color: var(--cyan); }
  .next-banner.none{ color: var(--text-faint); }

  .next-content{ flex: 1; min-width: 0; }
  .next-top{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .next-sub{
    display: flex;
    flex-wrap: wrap;
    gap: 4px 14px;
    margin-top: 9px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
  }
  .next-sub .sub-chip{
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .next-sub .sub-chip b{
    font-weight: 800;
    margin-left: 2px;
  }
  .next-banner.dir1 .next-sub .sub-chip b{ color: var(--amber); }
  .next-banner.dir2 .next-sub .sub-chip b{ color: var(--cyan); }
  .next-sub:empty{ display: none; }

  /* ---------------- STATION-BY-STATION DETAIL BANNER ---------------- */
  .next-banner.upcoming{
    margin-top: 8px;
    opacity: 0.94;
  }
  .next-banner.upcoming .upcoming-content{
    flex: 1;
    min-width: 0;
  }
  .upcoming-head{
    display: flex;
    align-items: baseline;
    justify-content: flex-start;
    gap: 8px;
  }
  .upcoming-head .lbl{ flex-shrink: 0; }
  .upcoming-head .upcoming-no{
    font-size: 12px;
    font-weight: 800;
  }
  .next-banner.upcoming.dir1 .upcoming-no{ color: var(--amber); }
  .next-banner.upcoming.dir2 .upcoming-no{ color: var(--cyan); }
  .upcoming-grid{
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 2px;
    margin-top: 7px;
  }
  .upcoming-grid .cell{
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .upcoming-grid .cell .t{
    font-size: 11.5px;
    font-weight: 700;
    color: var(--text);
  }
  .upcoming-grid .cell.dash .t{
    color: var(--text-faint);
    font-weight: 500;
  }
  .upcoming-grid .cell .stn{
    font-size: 8px;
    font-weight: 600;
    color: var(--text-faint);
    letter-spacing: 0.01em;
  }
  .nav-btn{
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 9px;
    border: 1px solid var(--line-strong);
    background: var(--panel-2);
    color: var(--text-dim);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    padding: 0;
    transition: opacity .15s, background .15s, color .15s;
  }
  .nav-btn:disabled{
    opacity: 0.28;
    cursor: default;
  }
  .nav-btn:not(:disabled):active{
    background: var(--line-strong);
    color: var(--text);
  }

  /* ---------------- LEGEND / COLUMN HEAD ---------------- */
  .grid{
    display:grid;
    grid-template-columns: 44px repeat(5, 1fr);
    align-items:center;
  }
  .colhead{
    padding: 16px 10px 7px;
    font-size: 9.5px;
    color: var(--text-faint);
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .colhead > div{ text-align:center; line-height:1.3; }
  .colhead > div:first-child{ text-align:left; padding-left: 4px; }
  .colhead .sub{
    display:block;
    font-size: 8.5px;
    color: var(--text-faint);
    font-weight: 600;
    margin-top: 1px;
  }

  /* ---------------- TABLE / ROWS ---------------- */
  .list{
    margin: 0 12px;
    background: var(--panel);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .row{
    padding: 10px 10px 9px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .row:last-child{ border-bottom:none; }
  .row .no{
    font-size: 10px;
    color: var(--text-faint);
    padding-left: 4px;
  }
  .row .cell{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 2px;
  }
  .row .cell .t{
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text);
  }
  .row .cell .stn{
    font-size: 8.5px;
    font-weight: 600;
    color: var(--text-faint);
    letter-spacing: 0.01em;
  }
  .row .cell.dash .t{
    color: var(--text-faint);
    font-weight: 500;
    font-size: 12px;
  }

  .row.next{
    background: linear-gradient(90deg, var(--amber-dim), transparent 85%);
  }
  .row.next.dir2{
    background: linear-gradient(90deg, var(--cyan-dim), transparent 85%);
  }
  .row.next .cell .t{ color: var(--amber); }
  .row.next.dir2 .cell .t{ color: var(--cyan); }
  .row.next .cell.dash .t{ color: var(--text-faint); }
  .row.next::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width: 3px;
    background: var(--amber);
  }
  .row.next.dir2::before{ background: var(--cyan); }
  .row.past{ opacity: 0.38; }

  .badge{
    display:inline-block;
    font-size: 9.5px;
    font-weight: 800;
    color: var(--bg);
    background: var(--amber);
    padding: 1px 5px;
    border-radius: 5px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0;
  }
  .row.dir2 .badge{ background: var(--cyan); }

  footer{
    padding: 22px 20px 10px;
    font-size: 11px;
    color: var(--text-faint);
    line-height: 1.6;
  }
  footer b{ color: var(--text-dim); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-row">
      <h1>대경선 시간표<span>구미 · 왜관 · 대구 · 동대구 · 경산</span></h1>
      <div class="clock">
        <div class="t mono" id="clockTime">--:--</div>
        <div class="d" id="clockDate">-</div>
      </div>
    </div>

    <div class="segment daytype" id="daytypeSeg">
      <button data-v="weekday">평일</button>
      <button data-v="holiday">주말·공휴일</button>
    </div>

    <div class="dirtabs" id="dirtabs">
      <button data-dir="1">
        <span class="dot"></span>
        <span class="route">동대구 · 경산 → 구미</span>
        <span class="arrow">▸</span>
      </button>
      <button data-dir="2">
        <span class="dot"></span>
        <span class="route">구미 → 동대구 · 경산</span>
        <span class="arrow">▸</span>
      </button>
    </div>
  </header>

  <div class="next-banner none" id="nextBanner">
    <button class="nav-btn" id="nextPrev" aria-label="이전 열차">‹</button>
    <div class="next-content">
      <div class="next-top">
        <div>
          <div class="lbl" id="nextLbl">다음 열차</div>
          <div class="big" id="nextInfo">불러오는 중…</div>
        </div>
        <div class="eta">
          <div class="n mono" id="nextEta">–</div>
          <div class="u">분 후</div>
        </div>
      </div>
      <div class="next-sub" id="nextSub"></div>
    </div>
    <button class="nav-btn" id="nextNext" aria-label="다음 열차">›</button>
  </div>

  <div class="next-banner upcoming none" id="upcomingBanner">
    <div class="upcoming-content">
      <div class="upcoming-head">
        <span class="lbl">정차역 시간표</span>
        <span class="upcoming-no mono" id="upcomingNo">–</span>
      </div>
      <div class="upcoming-grid" id="upcomingGrid"></div>
    </div>
  </div>

  <div class="colhead grid" id="colhead"></div>

  <div class="list" id="list"></div>

  <footer>
    <b>구미시청 제공 자료(2024.12.14~)</b> 기준으로 정리했어요. 실제 운행은 관제 상황에 따라 달라질 수 있으니, 급할 땐 역 안내를 함께 확인하세요.<br>
    이 페이지는 인터넷 연결 없이도 휴대폰에 저장해두고 볼 수 있어요.
  </footer>
</div>

let state = {
  daytype: (new Date().getDay()===0 || new Date().getDay()===6) ? 'holiday' : 'weekday',
  dir: '1',
  selectedOffset: 0
};

let lastNextIdx = -1;
let lastRows = [];

function toMinutes(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  return h*60+m;
}

function nowMinutes(){
  const d = new Date();
  return d.getHours()*60 + d.getMinutes();
}

function renderClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('clockTime').textContent = hh+':'+mm;
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('clockDate').textContent =
    (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+days[d.getDay()]+')';
}

function renderSegments(){
  document.querySelectorAll('#daytypeSeg button').forEach(b=>{
    b.classList.toggle('active', b.dataset.v === state.daytype);
  });
  document.querySelectorAll('#dirtabs button').forEach(b=>{
    b.classList.toggle('active', b.dataset.dir === state.dir);
  });
}

// column order per direction: [key, header label, sub label]
const COLS1 = [
  ['gs','경산','출발'],
  ['dd','동대구',''],
  ['dg','대구',''],
  ['wg','왜관',''],
  ['gm','구미','도착']
];
const COLS2 = [
  ['gm','구미','출발'],
  ['wg','왜관',''],
  ['dg','대구',''],
  ['dd','동대구',''],
  ['gs','경산','도착']
];

function refMinutes(r, dir){
  // effective departure reference time for sorting/highlighting
  if(dir === '1'){
    return toMinutes(r.gs || r.dd);
  } else {
    return toMinutes(r.gm);
  }
}

function render(){
  renderSegments();
  const rows = DATA['dir'+state.dir][state.daytype];
  const list = document.getElementById('list');
  const colhead = document.getElementById('colhead');
  const now = nowMinutes();
  const cols = state.dir === '1' ? COLS1 : COLS2;

  colhead.innerHTML = '<div>열차</div>' + cols.map(c =>
    `<div>${c[1]}${c[2] ? `<span class="sub">${c[2]}</span>` : ''}</div>`
  ).join('');

  let nextIdx = -1;

  list.innerHTML = rows.map((r,i)=>{
    let m = refMinutes(r, state.dir);
    if(m < now - 720) m += 1440; // handle after-midnight trains
    if(nextIdx===-1 && m >= now) { nextIdx = i; }
    return rowHtml(r, i, 'dir'+state.dir, cols);
  }).join('');

  lastNextIdx = nextIdx;
  lastRows = rows;
  renderSelected();

  // scroll next row into view softly
  const el = document.querySelector('.row.next');
  if(el){
    setTimeout(()=> el.scrollIntoView({block:'center', behavior:'smooth'}), 150);
  }
}

function formatEta(diff){
  if(diff == null) return null;
  return diff <= 0 ? '곧' : diff+'분 후';
}

function stationEtaText(r, key, now){
  const val = r[key];
  if(!val) return null;
  let m = toMinutes(val);
  if(m < now - 720) m += 1440;
  return formatEta(m - now);
}

function renderSelected(){
  const nextBanner = document.getElementById('nextBanner');
  const nextLbl = document.getElementById('nextLbl');
  const info = document.getElementById('nextInfo');
  const eta = document.getElementById('nextEta');
  const sub = document.getElementById('nextSub');
  const prevBtn = document.getElementById('nextPrev');
  const nextBtn = document.getElementById('nextNext');

  const detailBanner = document.getElementById('upcomingBanner');
  const noEl = document.getElementById('upcomingNo');
  const grid = document.getElementById('upcomingGrid');

  nextBanner.classList.remove('none','dir1','dir2');
  detailBanner.classList.remove('none','dir1','dir2');

  if(lastNextIdx === -1){
    nextBanner.classList.add('none');
    nextLbl.textContent = '다음 열차';
    info.textContent = '오늘 남은 열차가 없어요';
    eta.textContent = '–';
    sub.innerHTML = '';
    prevBtn.disabled = true;
    nextBtn.disabled = true;

    detailBanner.classList.add('none');
    noEl.textContent = '–';
    grid.innerHTML = '';
    return;
  }

  const maxOffset = lastRows.length - 1 - lastNextIdx;
  if(state.selectedOffset > maxOffset) state.selectedOffset = maxOffset;
  if(state.selectedOffset < 0) state.selectedOffset = 0;

  const targetIdx = lastNextIdx + state.selectedOffset;
  const r = lastRows[targetIdx];
  const now = nowMinutes();
  const cols = state.dir === '1' ? COLS1 : COLS2;

  // ---- banner 1: selected train summary + paging ----
  nextBanner.classList.add('dir'+state.dir);
  nextLbl.textContent = state.selectedOffset === 0 ? '다음 열차'
    : state.selectedOffset === 1 ? '그 다음 열차'
    : (state.selectedOffset+1)+'번째 다음 열차';

  if(state.dir==='1'){
    info.innerHTML = r.no+' <span style="color:var(--text-dim);font-weight:600;">· '+r.from+' 출발</span>';
  } else {
    info.innerHTML = r.no+' <span style="color:var(--text-dim);font-weight:600;">· '+r.to+' 행</span>';
  }

  let m = refMinutes(r, state.dir);
  if(m < now - 720) m += 1440;
  const diff = m - now;
  eta.textContent = diff <= 0 ? '곧' : diff;

  if(state.dir === '1'){
    const dd = stationEtaText(r, 'dd', now);
    const dg = stationEtaText(r, 'dg', now);
    sub.innerHTML =
      (dd ? `<span class="sub-chip">동대구 도착 <b>${dd}</b></span>` : '') +
      (dg ? `<span class="sub-chip">대구 도착 <b>${dg}</b></span>` : '');
  } else {
    const wg = stationEtaText(r, 'wg', now);
    sub.innerHTML = wg ? `<span class="sub-chip">왜관 도착 <b>${wg}</b></span>` : '';
  }

  prevBtn.disabled = state.selectedOffset <= 0;
  nextBtn.disabled = targetIdx >= lastRows.length - 1;

  // ---- banner 2: full station-by-station schedule for the same train ----
  detailBanner.classList.add('dir'+state.dir);
  noEl.textContent = r.no.replace('K','#');
  grid.innerHTML = cellsHtml(r, cols);
}


function cellsHtml(r, cols){
  return cols.map(c => {
    const v = r[c[0]];
    const stn = c[1];
    return v
      ? `<div class="cell"><span class="t mono">${v}</span><span class="stn">${stn}</span></div>`
      : `<div class="cell dash"><span class="t">–</span><span class="stn">${stn}</span></div>`;
  }).join('');
}

function rowHtml(r, i, dirclass, cols){
  let cls = 'row grid ' + dirclass;
  const cells = cellsHtml(r, cols);
  return `<div class="${cls}" data-idx="${i}">
    <div class="no mono">${r.no.replace('K','#')}</div>
    ${cells}
  </div>`;
}

// mark next/past rows after render, using minute compare (done separately for simplicity + accuracy)
function markNextPast(){
  const rows = DATA['dir'+state.dir][state.daytype];
  const now = nowMinutes();
  const nodeList = document.querySelectorAll('.row');
  let foundNext = false;
  nodeList.forEach((node, i)=>{
    const r = rows[i];
    let m = refMinutes(r, state.dir);
    if(m < now - 720) m += 1440;
    node.classList.remove('next','past');
    if(!foundNext && m >= now){
      node.classList.add('next');
      foundNext = true;
    } else if(m < now){
      node.classList.add('past');
    }
  });
}

function fullRender(){
  render();
  markNextPast();
}

document.getElementById('daytypeSeg').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  state.daytype = btn.dataset.v;
  state.selectedOffset = 0;
  fullRender();
});
document.getElementById('dirtabs').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if(!btn) return;
  state.dir = btn.dataset.dir;
  state.selectedOffset = 0;
  fullRender();
});
document.getElementById('nextPrev').addEventListener('click', ()=>{
  if(state.selectedOffset > 0){
    state.selectedOffset--;
    renderSelected();
  }
});
document.getElementById('nextNext').addEventListener('click', ()=>{
  state.selectedOffset++;
  renderSelected();
});

renderClock();
fullRender();
setInterval(()=>{ renderClock(); fullRender(); }, 30000);
</script>
